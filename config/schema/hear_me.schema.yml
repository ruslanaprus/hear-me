hear_me.settings:
  type: config_object
  label: 'Hear Me settings'
  mapping:
    provider:
      type: string
      label: 'Active TTS provider key'
    cache_enabled:
      type: boolean
      label: 'Enable file-based caching'
    runtime_cache_scheme:
      type: string
      label: 'Runtime audio cache stream wrapper scheme'
    cache_inline_ttl:
      type: integer
      label: 'Inline TTS cache TTL in seconds'
    cache_page_ttl:
      type: integer
      label: 'Page TTS cache TTL in seconds'
    cache_selection_ttl:
      type: integer
      label: 'Selected text TTS cache TTL in seconds'
    cache_ad_hoc_ttl:
      type: integer
      label: 'Ad-hoc TTS cache TTL in seconds'
    cache_max_files:
      type: integer
      label: 'Maximum number of runtime audio cache files'
    cache_max_total_mb:
      type: integer
      label: 'Maximum runtime audio cache size in megabytes'
    rate_limit_window_seconds:
      type: integer
      label: 'Sliding rate limit window in seconds'
    rate_limit_user_requests:
      type: integer
      label: 'Maximum TTS requests per user per rate-limit window'
    rate_limit_ip_requests:
      type: integer
      label: 'Maximum TTS requests per IP per rate-limit window'
    rate_limit_role_requests:
      type: integer
      label: 'Maximum TTS requests per role set per rate-limit window'
    daily_user_quota:
      type: integer
      label: 'Maximum TTS requests per user per day'
    monthly_user_quota:
      type: integer
      label: 'Maximum TTS requests per user per month'
    tts_audio_field:
      type: string
      label: 'Machine name of the node field used to attach TTS audio media'
    queue_bundles:
      type: sequence
      label: 'Node bundles that trigger queue-based TTS pre-generation on insert'
      sequence:
        type: string
        label: 'Bundle machine name'
    replace_existing_generated_audio:
      type: boolean
      label: 'Replace existing HearMe-generated audio when content changes'
    overwrite_manual_audio:
      type: boolean
      label: 'Overwrite manually selected audio'
    max_request_bytes:
      type: integer
      label: 'Maximum TTS request body size in bytes'
    max_text_length:
      type: integer
      label: 'Maximum TTS text length in characters'

hear_me.provider.piper:
  type: config_object
  label: 'Piper TTS provider settings'
  mapping:
    endpoint:
      type: string
      label: 'Piper TTS endpoint URL'
    allow_private_endpoint_urls:
      type: boolean
      label: 'Allow local/private provider endpoints'
    default_lang:
      type: string
      label: 'Default language code'
    supported_langs:
      type: sequence
      label: 'Supported language codes'
      sequence:
        type: string
        label: 'Language code'
