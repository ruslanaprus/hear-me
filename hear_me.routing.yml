hear_me.tts:
  path: '/hear-me/tts'
  defaults:
    _controller: '\Drupal\hear_me\Controller\HearMeController::synthesize'
    _title: 'HearMe TTS'
  requirements:
    _permission: 'use tts playback'
  methods: [POST]

hear_me.settings:
  path: '/admin/config/media/hear-me'
  defaults:
    _form:  '\Drupal\hear_me\Form\HearMeSettingsForm'
    _title: 'HearMe TTS Settings'
  requirements:
    _permission: 'administer site configuration'
