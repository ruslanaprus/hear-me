services:
  # Shared file-path utility
  hear_me.file_helper:
    class: Drupal\hear_me\Service\TtsFileHelper

  # TTS endpoint request validator
  hear_me.input_validator:
    class: Drupal\hear_me\Service\HearMeInputValidator
    arguments:
      - '@config.factory'
      - '@hear_me.service'

  # Runtime audio cache metadata and retention manager
  hear_me.cache_manager:
    class: Drupal\hear_me\Service\TtsCacheManager
    arguments:
      - '@database'
      - '@config.factory'
      - '@file_system'
      - '@stream_wrapper_manager'
      - '@entity_type.manager'
      - '@datetime.time'
      - '@logger.factory'

  # Flood API throttle and quota manager
  hear_me.rate_limiter:
    class: Drupal\hear_me\Service\HearMeRateLimiter
    arguments:
      - '@config.factory'
      - '@flood'
      - '@current_user'
      - '@request_stack'

  # Node queue payload builder for pre-generated audio
  hear_me.node_audio_queue:
    class: Drupal\hear_me\Service\HearMeNodeAudioQueue
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@queue'
      - '@logger.factory'

  # Existing node backfill queue manager
  hear_me.existing_content_queue:
    class: Drupal\hear_me\Service\HearMeExistingContentQueue
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@entity_field.manager'
      - '@hear_me.node_audio_queue'
      - '@hear_me.service'

  # Installation and runtime readiness checks for the admin settings form
  hear_me.setup_status:
    class: Drupal\hear_me\Service\HearMeSetupStatus
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@file_system'
      - '@stream_wrapper_manager'
      - '@plugin.manager.queue_worker'
      - '@state'
      - '@date.formatter'
      - '@datetime.time'
      - '@hear_me.service'

  # Central orchestrator service
  hear_me.service:
    class: Drupal\hear_me\Service\HearMeService
    arguments:
      - '@config.factory'
      - !tagged_iterator { tag: hear_me.provider, index_by: provider_key }
      - '@entity_type.manager'
      - '@hear_me.file_helper'
      - '@hear_me.cache_manager'
      - '@lock'
      - '@logger.factory'
      - '@private_key'

  # Piper-compatible HTTP adapter.
  hear_me.provider.piper:
    class: Drupal\hear_me\Plugin\TtsProvider\PiperProvider
    arguments:
      - '@http_client'
      - '@config.factory'
      - '@language_manager'
      - '@logger.factory'
    tags:
      - { name: hear_me.provider, provider_key: piper }
